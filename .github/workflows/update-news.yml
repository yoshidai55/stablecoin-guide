name: Update stablecoin news

on:
  schedule:
    # 毎日 20:00 UTC = 翌日 05:00 JST に実行（GitHub混雑時は多少前後します）
    - cron: "0 20 * * *"
  workflow_dispatch: {}   # 手動実行ボタンも有効化

permissions:
  contents: write

concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update news.json from RSS feeds
        run: python scripts/update_news.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain news.json)" ]; then
            git add news.json
            git commit -m "chore: auto-update news $(date -u +%Y-%m-%d)"
            git push
            echo "news.json updated and pushed."
          else
            echo "No changes to commit."
          fi
